<!DOCTYPE html>
<html>
	<head>

		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">

		<title>ST-Insight</title>
		
		<meta name="apple-mobile-web-app-title" content="ST-Insight">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="mobile-web-app-capable" content="yes">
		<link rel="icon" href="icon-192.png">
		
		<link rel="stylesheet" href="style.css">
		<link rel="manifest" href="manifest.json">
		<meta name="theme-color" content="#4CAF50">
		
	</head>

	<body>
		<!-- 試合設定 -->
		<div id="setup">

			<h4>味方</h4>
			<div class="player-input-row">
				<input id="A1" class="player-name-input" placeholder="正クロス側">
				<input id="A2" class="player-name-input" placeholder="逆クロス側">
			</div>

			<h4>対戦相手</h4>
			<div class="player-input-row">
				<input id="B1" class="player-name-input" placeholder="正クロス側">
				<input id="B2" class="player-name-input" placeholder="逆クロス側">
			</div>

			<br>

			ゲーム数

			<label><input type="radio" name="games" value="3">3</label>
			<label><input type="radio" name="games" value="5" checked>5</label>
			<label><input type="radio" name="games" value="7">7</label>
			<label><input type="radio" name="games" value="9">9</label>

			<br><br>

			サービス権

			<label><input type="radio" name="serve" value="A" checked>味方</label>
			<label><input type="radio" name="serve" value="B">対戦相手</label>

			<br><br>

			<button class="start-match-btn" onclick="startMatch()">試合開始</button>

			<!-- 設定画面バージョン情報 -->
			<div id="appInfo" class="beta-label"></div>

			<!-- β版注意事項-->
			 <div id="betaNotice" class="betaNotice hidden">
				<strong>ST-Insight β版</strong><br>
				現在、試験公開中です。不具合やご要望があれば、<br>
				<a href="https://www.threads.com/@homare.the.twins?igshid=NTc4MTlwNjQ2YQ==" target="_blank" rel="noopener noreferrer">Threads</a>または
				<a href="https://www.instagram.com/stinsight_app?igsh=cjJseGxvaTZ1bmxv&utm_source=qr/" target="_blank" rel="noopener noreferrer">Instagram</a>
				のDMからお知らせください。<br>
				※入力データはこの端末のブラウザ内に保存されます。ブラウザのデータ削除や端末変更により消える場合があります。<br>
			</div>
		</div> <!-- 設定画面 終了-->
		
		<!-- 試合開始後画面 -->
		<div id="match" class="hidden">

			<!-- スコアボード -->
			<table class="scoreboard" id="scoreboard">
				<colgroup>
				<col style="width:150px;">	<!-- CSSと合わせる -->
				<col>
				<col>
				<col>
				<col>
				<col style="width:68px;">
				</colgroup>
			</table>

			<div class="player-area">
				<div id="windArea" class="control-wind">	
					<button class="windBtn" onclick="changeWind(this, '追風')"><span class="windArrow">↑</span>追風</button>
					<button class="windBtn" onclick="changeWind(this, '向風')"><span class="windArrow">↓</span>向風</button>
					<button class="windBtn" onclick="changeWind(this, '左風')"><span class="windArrow">→</span>左風</button>
					<button class="windBtn" onclick="changeWind(this, '右風')"><span class="windArrow">←</span>右風</button>
					<button class="windBtn activeWind" onclick="changeWind(this, '無風')"><span class="windArrow">〇</span>無風</button>
				</div>

				<button id="finishMatchBtn" type="button">試合終了</button>

				<div class="player-group">
					<div id="players">
						<button class="playerBtn" id="btnA1"></button>
						<button class="playerBtn" id="btnA2"></button>
						<button class="playerBtn" id="btnB1"></button>
						<button class="playerBtn" id="btnB2"></button>
					</div>
				</div>

				<button id="undoBtn" type="button">↩ 戻す</button>

			</div>

			<!-- 試合中画面 環境表示-->
			<div id="envLabel" class="beta-label"></div>

			<!-- ショットボタン -->
			<div class="shot-grid" id="shotButtons"></div>

			<!-- 得点履歴やショット集計等 -->
			<div class="stats-row">
				<div class="stats-block history">
					<!-- 得点履歴 -->
					<button class="stat-btn" onclick="toggleHistory()">得点履歴</button>
					<div id="historyArea" class="stat-area"></div> <!-- class="hidden"></div> -->
				</div>
				
				<div class="stats-block serve">
					<!-- サーブ確率 -->
					<button class="stat-btn" onclick="toggleStats()">サーブ確率</button>
					<div id="statsArea" class="stat-area"></div> <!-- class="hidden"></div> -->
				</div>
					
				<div class="stats-block shot">
					<!-- ショット集計 -->
					<button class="stat-btn" onclick="toggleShotStats()">ショット集計</button>
					<div id="shotStatsArea" class="stat-area"></div> <!-- class="hidden"></div> -->
				</div>
			</div>

			<!-- 試合分析 -->
			<div class="stats-block analysis">
				<button id="analysisToggleBtn" class="stat-btn" onclick="toggleAnalysis()">途中分析</button>

				<div id="analysisArea" class="stat-area hidden">

					<!-- 試合結果 -->
					<div id="analysisMatchResult"></div>

					<!-- 分析タブ -->
					<div class="analysis-tabs">
						<button id="analysisTabSummary"
								class="analysisTab active"
								onclick="switchAnalysisTab('summary')">
							サマリー
						</button>

						<button id="analysisTabGraph"
								class="analysisTab"
								onclick="switchAnalysisTab('graph')">
							グラフ
						</button>

						<button id="analysisTabServe"
								class="analysisTab"
								onclick="switchAnalysisTab('serve')">
							準備中
						</button>
					</div>

					<!-- チーム切替 -->
					<div class="analysis-team-tabs">
						<button id="analysisTeamA"
								class="analysisTeamTab active"
								onclick="switchAnalysisTeam('A')">
							味方
						</button>

						<button id="analysisTeamB"
								class="analysisTeamTab"
								onclick="switchAnalysisTeam('B')">
							対戦相手
						</button>
					</div>

					<!-- コンテンツ -->
					<div id="analysisContent"></div>

				</div>
			</div>

			<!-- 次の試合ボタン -->
			<div style="text-align:center;margin-top:20px;">
				<button id="nextMatchBtn" class="hidden" onclick="nextMatch()">次の試合</button>
			</div>
			
		</div> <!-- 試合中画面 終了-->

		<!-- デバッグ用 -->
		 <!-- <div id="debugArea"
			style="white-space:pre-wrap;
					font-size:12px;
					color:red;">
		</div> -->

	<!-- ToDo★★★ chart.js,pluginは公開時にはローカル配置する -->
		<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
		<script src="js/config.js" defer></script>
		<script src="js/settings.js" defer></script>
		<script src="js/state.js" defer></script>
		<script src="js/serve.js" defer></script>
		<script src="js/history.js" defer></script>
		<script src="js/ui.js" defer></script>
		<script src="js/analysis.js" defer></script>
		<script src="js/app.js" defer></script>
		
		<script>
			if("serviceWorker" in navigator){
				navigator.serviceWorker
					.register("./service-worker.js")
					.then(()=>{
						console.log("SW registered")
					})
					.catch(err=>{
						console.log(err)
					})
			}
		</script>
	</body>
</html>
